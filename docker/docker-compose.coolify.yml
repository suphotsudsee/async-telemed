services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telemed}
      POSTGRES_USER: ${POSTGRES_USER:-telemed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - coolify_postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemed} -d ${POSTGRES_DB:-telemed}"]
      interval: 10s
      timeout: 5s
      retries: 10

  node-api:
    build:
      context: .
      dockerfile: docker/node-api.prod.Dockerfile
    environment:
      PORT: 8081
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-telemed}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-telemed}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OTP_MODE: ${OTP_MODE:-demo}
      API_URL: ${PUBLIC_API_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_LIFF_ID: ${VITE_LIFF_ID:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_REGION: ${STORAGE_REGION:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT:-8081}:8081"

  patient-ui:
    build:
      context: .
      dockerfile: docker/patient.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_LIFF_ID: ${VITE_LIFF_ID:-}
        VITE_LIFF_URL: ${VITE_LIFF_URL:-}
        VITE_LIFF_MOCK: ${VITE_LIFF_MOCK:-false}
    depends_on:
      node-api:
        condition: service_healthy
    ports:
      - "${PATIENT_PORT:-5183}:80"

  doctor-ui:
    build:
      context: .
      dockerfile: docker/doctor.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    depends_on:
      node-api:
        condition: service_healthy
    ports:
      - "${DOCTOR_PORT:-5184}:80"

  admin-ui:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    depends_on:
      node-api:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-5185}:80"

volumes:
  coolify_postgres_data:
