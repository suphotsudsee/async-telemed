services:
  postgres:
    image: postgres:16
    container_name: telemed-postgres
    environment:
      POSTGRES_DB: telemed
      POSTGRES_USER: telemed
      POSTGRES_PASSWORD: telemed
    ports:
      - "5432:5432"
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d

  node-api:
    build:
      context: ..
      dockerfile: docker/node-api.Dockerfile
    environment:
      PORT: 8080
      JWT_SECRET: replace-me
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      FASTAPI_URL: http://fastapi:8000
      LINE_CHANNEL_SECRET: replace-me
      DATABASE_URL: postgresql://telemed:telemed@postgres:5432/telemed
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - fastapi

  fastapi:
    build:
      context: ..
      dockerfile: docker/fastapi.Dockerfile
    ports:
      - "8000:8000"

  patient-ui:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_NAME: frontend-patient
        VITE_API_URL: http://localhost:8080
    ports:
      - "4173:80"

  doctor-ui:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_NAME: frontend-doctor
        VITE_API_URL: http://localhost:8080
    ports:
      - "4174:80"

  admin-ui:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_NAME: frontend-admin
        VITE_API_URL: http://localhost:8080
    ports:
      - "4175:80"

